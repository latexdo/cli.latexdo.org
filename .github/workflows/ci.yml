name: CLI CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      source_repository:
        description: Repository that triggered this CI.
        required: false
      source_sha:
        description: Commit SHA that triggered this CI.
        required: false
      source_run_id:
        description: GitHub Actions run ID that triggered this CI.
        required: false
      source_run_url:
        description: GitHub Actions run URL that triggered this CI.
        required: false

permissions:
  contents: read

concurrency:
  group: cli-latexdo-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate / CLI package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.17.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Check shell scripts
        run: |
          sh -n install.sh
          sh -n bin/latexdo

      - name: Check CLI help
        run: ./bin/latexdo help

      - name: Check package contents
        run: npm pack --dry-run
